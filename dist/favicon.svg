<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stellar Interaction planet">
  <defs>
    <radialGradient id="planetGlow" cx="32%" cy="26%" r="76%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="18%" stop-color="#7dd3fc" />
      <stop offset="52%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="ringGradient" x1="8" x2="56" y1="44" y2="20">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.12" />
      <stop offset="30%" stop-color="#fde68a" />
      <stop offset="58%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.16" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#020617" />
  <circle cx="12" cy="12" r="1.2" fill="#f8fafc" opacity="0.9" />
  <circle cx="50" cy="12" r="1" fill="#67e8f9" opacity="0.85" />
  <circle cx="54" cy="50" r="1.35" fill="#facc15" opacity="0.9" />
  <circle cx="9" cy="48" r="0.9" fill="#e0f2fe" opacity="0.7" />

  <ellipse
    cx="32"
    cy="34"
    rx="27"
    ry="8.5"
    fill="none"
    stroke="url(#ringGradient)"
    stroke-width="5"
    transform="rotate(-18 32 34)"
    filter="url(#softGlow)"
  />

  <circle cx="32" cy="32" r="18" fill="url(#planetGlow)" filter="url(#softGlow)" />
  <path
    d="M19.5 35.5c5.8 3.7 15.6 4.3 25.3 1.2"
    fill="none"
    stroke="#38bdf8"
    stroke-width="2.5"
